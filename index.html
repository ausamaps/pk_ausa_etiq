  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f2f5; color:#1a1a2e; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    #header { position:fixed; top:0; left:0; right:0; background:#0d1526; padding:0 16px; height:48px; display:flex; align-items:center; justify-content:space-between; z-index:2000; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
    #header-logo svg { height:22px; }
    #header-title { font-size:13px; font-weight:600; color:#f0a500; letter-spacing:0.08em; text-transform:uppercase; }

    #map { flex:1; width:100%; position:relative; margin-top:48px; }

    #gps-btn { position:fixed; bottom:230px; right:14px; z-index:1000; width:48px; height:48px; border-radius:50%; background:#fff; border:none; color:#0066ff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.25); -webkit-tap-highlight-color:transparent; transition:transform 0.1s; }
    #gps-btn:active { transform:scale(0.92); }
    #gps-btn.locating { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 2px 12px rgba(0,0,0,0.25)} 50%{box-shadow:0 2px 20px rgba(0,102,255,0.5)} }

    #popup-panel { position:absolute; bottom:0; left:0; right:0; z-index:1000; background:#fff; border-top:1px solid #e0e0e0; border-radius:20px 20px 0 0; padding:0 20px 36px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:0 -4px 24px rgba(0,0,0,0.12); }
    #popup-panel.visible { transform:translateY(0); }
    #popup-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:12px auto 16px; }
    #popup-close { position:absolute; top:14px; right:18px; background:none; border:none; color:#999; font-size:24px; cursor:pointer; padding:4px; line-height:1; -webkit-tap-highlight-color:transparent; }
    #pk-value { font-size:38px; font-weight:800; color:#0066ff; letter-spacing:0.02em; margin-bottom:2px; }
    #pk-label { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#999; margin-bottom:16px; }
    .info-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
    .info-row:last-child { border-bottom:none; }
    .info-icon { font-size:18px; width:26px; flex-shrink:0; margin-top:1px; }
    .info-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#999; margin-bottom:2px; }
    .info-value { font-size:15px; font-weight:600; color:#1a1a2e; }

    #status { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:999; background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 14px; font-size:12px; color:#fff; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.3s; }
    #status.visible { opacity:1; }

    .leaflet-popup { display:none !important; }
    .leaflet-control-container { display:none !important; }

    /* Lollipop rojo pastel de ubicación: no bloquea clicks */
    .loc-lollipop { pointer-events:none !important; }

    /* Control de zoom DEBAJO del botón GPS - bloque compacto */
    #zoom-buttons {
      position:fixed;
      right:14px;
      bottom:120px;
      display:flex;
      flex-direction:column;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 2px 14px rgba(0,0,0,0.25);
      z-index:1000;
      background:#fff;
    }
    #zoom-buttons button {
      width:48px; height:48px;
      background:#fff;
      color:#0066ff;
      border:none;
      font-size:28px;
      font-weight:700;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      padding:0;
      transition:background 0.1s;
    }
    #zoom-in { border-bottom:1px solid #e0e0e0; }
    #zoom-buttons button:hover { background:#f5f9ff; }
    #zoom-buttons button:active { background:#f0f4ff; }

    /* Indicador de zoom numérico: dentro del bloque de zoom */
    #zoom-indicator-side {
      position:fixed;
      right:14px;
      bottom:72px;
      background:#fff;
      border-radius:8px;
      padding:8px;
      width:48px;
      text-align:center;
      font-size:16px;
      font-weight:700;
      color:#0066ff;
      box-shadow:0 2px 14px rgba(0,0,0,0.25);
      pointer-events:none;
      z-index:1000;
    }


    /* Etiquetas de PK con halo amarillo, igual al SLD original */
    .pk-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      color: #000;
      padding: 0 3px !important;
      white-space: nowrap;
      pointer-events: none;
    }
    .pk-label::before { display: none !important; }
    .pk-label-far   { font-size: 11px; text-shadow: -1.5px -1.5px 0 #ffd901, 1.5px -1.5px 0 #ffd901, -1.5px 1.5px 0 #ffd901, 1.5px 1.5px 0 #ffd901, 0 -1.5px 0 #ffd901, 0 1.5px 0 #ffd901, -1.5px 0 0 #ffd901, 1.5px 0 0 #ffd901; }
    .pk-label-close { font-size: 10px; text-shadow: -1.3px -1.3px 0 #ffd901, 1.3px -1.3px 0 #ffd901, -1.3px 1.3px 0 #ffd901, 1.3px 1.3px 0 #ffd901, 0 -1.3px 0 #ffd901, 0 1.3px 0 #ffd901, -1.3px 0 0 #ffd901, 1.3px 0 0 #ffd901; }
  </style>
</head>

"6+520","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38808809,"lat":-34.57737694,"pk":"6+530","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38819291,"lat":-34.57735233,"pk":"6+540","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38829774,"lat":-34.57732772,"pk":"6+550","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38840256,"lat":-34.57730311,"pk":"6+560","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38850738,"lat":-34.57727849,"pk":"6+570","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.3886122,"lat":-34.57725388,"pk":"6+580","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38871702,"lat":-34.57722927,"pk":"6+590","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38882185,"lat":-34.57720466,"pk":"6+600","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":4},{"lng":-58.38892667,"lat":-34.57718004,"pk":"6+610","tramo":"Paseo del Bajo","banda":"Bidireccional","escala":5},{"lng":-58.38082609,"lat":-34.62304326,"pk":"3+450","tramo":"Au. Frondizi","banda":"Bidireccional","escala":5}];
const BLUE = '#0066ff';

const map = L.map('map', { center:[-34.65,-58.45], zoom:11, zoomControl:true, attributionControl:false, preferCanvas:true });

// Esri World Topo Map
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:19
}).addTo(map);

// --- ESTILOS circleMarker ---
// circleMarker se dibuja en un único canvas/SVG compartido por todo el mapa
// (no crea un <div> HTML por cada punto como hacía divIcon), lo que es mucho
// más liviano con miles de marcadores y elimina el lag al hacer pan/zoom.
const CIRCLE_STYLE = {
  small:    { radius:4,  color:'#0044cc', weight:1, fillColor:'#0066ff', fillOpacity:1 },
  medium:   { radius:6,  color:'#0044cc', weight:1, fillColor:'#0066ff', fillOpacity:1 },
  large:    { radius:8,  color:'#ffffff', weight:1.5, fillColor:'#0066ff', fillOpacity:1 },
  selected: { radius:11, color:'#ffffff', weight:2,   fillColor:'#0044cc', fillOpacity:1 }
};

// Cada escala se vuelve visible a partir de un zoom mínimo y permanece visible
// en todos los zooms más cercanos (acumulativo, nunca exclusivo). Esto evita
// huecos: a cualquier zoom se ven TODAS las escalas que ya "deberían" notarse.
const SCALE_CONFIG = {
  1: { minZoom:1,  style:'small'  },
  2: { minZoom:13, style:'medium' },
  3: { minZoom:14, style:'medium' },
  4: { minZoom:15, style:'large'  },
  5: { minZoom:17, style:'large'  }
};

// A partir de este zoom, todos los puntos visibles (de cualquier escala)
// deben verse con el mismo tamaño/ícono para que no haya diferencias visuales.
const UNIFORM_ZOOM = 15;

// ETIQUETAS DE PK (texto con halo amarillo).
// Igual lógica que los puntos: cada escala aparece a partir de un zoom mínimo
// y permanece visible en zooms más cercanos.
//   - Escala 4 (cada 100m) -> etiqueta visible desde zoom 15 (como los puntos)
//   - Escala 5 (cada 10m)  -> etiqueta visible solo en zoom muy cercano (18+)
// Las escalas 1/2/3 (cada 1000/500/250m) no llevan etiqueta para no saturar
// los zooms lejanos; solo se etiquetan los puntos densos de la autopista.
const LABEL_CONFIG = {
  1: { minZoom:11, className:'pk-label pk-label-far'   },
  2: { minZoom:13, className:'pk-label pk-label-far'   },
  3: { minZoom:14, className:'pk-label pk-label-far'   },
  4: { minZoom:15, className:'pk-label pk-label-far'   },
  5: { minZoom:18, className:'pk-label pk-label-close' }
};

let selectedMarker = null;
let selectedScale = null;

// Estado de zoom actual, consultado por cada marcador al momento de pintarse
let currentZoom = map.getZoom();

function shouldShow(scale, zoom) {
  const cfg = SCALE_CONFIG[scale];
  return zoom >= cfg.minZoom;
}

function shouldShowLabel(scale, zoom) {
  const cfg = LABEL_CONFIG[scale];
  return cfg ? zoom >= cfg.minZoom : false;
}

const allMarkers = []; // { marker, scale }

PK_DATA.forEach(p => {
  const cfg = SCALE_CONFIG[p.escala];
  if (!cfg) return;
  const style = CIRCLE_STYLE[cfg.style];
  const m = L.circleMarker([p.lat, p.lng], style);

  // Etiqueta de PK con halo amarillo - para TODAS las escalas
  // La visibilidad se controla por zoom en updateLayers()
  const labelCfg = LABEL_CONFIG[p.escala];
  if (labelCfg) {
    m.bindTooltip(p.pk, {
      permanent: true,
      direction: 'right',
      offset: [8, 0],
      className: labelCfg.className,
      interactive: false
    });
  }

  m.on('click', e => {
    L.DomEvent.stopPropagation(e);
    if (selectedMarker && selectedMarker !== m) {
      const prevCfg = SCALE_CONFIG[selectedScale];
      selectedMarker.setStyle(CIRCLE_STYLE[prevCfg.style]);
    }
    selectedMarker = m;
    selectedScale = p.escala;
    m.setStyle(CIRCLE_STYLE.selected);
    showPanel(p);
  });
  // Visibilidad inicial según el zoom con el que arranca el mapa.
  if (!shouldShow(p.escala, currentZoom)) m.setStyle({ opacity:0, fillOpacity:0 });
  m.addTo(map);
  // Asegurar que los PKs queden siempre arriba del punto de ubicación
  m.bringToFront();
  allMarkers.push({ marker: m, scale: p.escala, data: p });
});

const zoomEl = document.getElementById('zoom-indicator-side');
let isUniform = currentZoom >= UNIFORM_ZOOM;

function styleFor(scale, uniform) {
  if (uniform) return CIRCLE_STYLE.large;
  return CIRCLE_STYLE[SCALE_CONFIG[scale].style];
}

function updateLayers() {
  currentZoom = map.getZoom();
  zoomEl.textContent = currentZoom;
  const nowUniform = currentZoom >= UNIFORM_ZOOM;
  allMarkers.forEach(({ marker, scale }) => {
    const visible = shouldShow(scale, currentZoom);
    if (!visible) {
      marker.setStyle({ opacity:0, fillOpacity:0 });
    } else if (marker !== selectedMarker) {
      // Si cambiamos de modo (uniforme <-> por escala), reasignar el estilo correcto.
      if (nowUniform !== isUniform) marker.setStyle(styleFor(scale, nowUniform));
      else marker.setStyle(styleFor(scale, nowUniform)); // asegura opacidad restaurada tras estar oculto
    }
    // Visibilidad de la etiqueta de PK asociada a este marcador.
    const tip = marker.getTooltip();
    if (tip) {
      const tipEl = tip.getElement();
      if (tipEl) tipEl.style.display = (visible && shouldShowLabel(scale, currentZoom)) ? '' : 'none';
    }
  });
  isUniform = nowUniform;
}
map.on('zoomend', () => { updateLayers(); closePanel(); });
map.on('moveend', updateLayers);
map.whenReady(updateLayers);

// Cuando el navegador muestra/oculta la barra de direcciones (al hacer
// scroll, zoom o pan en mobile), el viewport cambia de tamaño pero
// Leaflet no se entera solo: hay que forzarlo con invalidateSize(),
// o el mapa queda desalineado respecto al header y los controles.
function fixMapSize() {
  map.invalidateSize();
}
window.addEventListener('resize', fixMapSize);
window.addEventListener('orientationchange', fixMapSize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixMapSize);
}
updateLayers();

// Panel
const panel = document.getElementById('popup-panel');
function closePanel() {
  panel.classList.remove('visible');
  if (selectedMarker) {
    selectedMarker.setStyle(styleFor(selectedScale, isUniform));
    selectedMarker = null;
  }
}
document.getElementById('popup-close').onclick = closePanel;
map.on('click', closePanel);

function showPanel(p) {
  document.getElementById('pk-value').textContent = p.pk;
  document.getElementById('info-tramo').textContent = p.tramo;
  panel.classList.add('visible');
}

// GPS
const statusEl = document.getElementById('status');
let statusTimer;
function showStatus(msg, dur=2500) {
  statusEl.textContent = msg; statusEl.classList.add('visible');
  clearTimeout(statusTimer);
  if(dur>0) statusTimer = setTimeout(()=>statusEl.classList.remove('visible'), dur);
}

let locMarker, locCircle;
document.getElementById('gps-btn').addEventListener('click', function() {
  this.classList.add('locating');
  showStatus('Buscando ubicación...', 0);
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat, longitude:lng, accuracy} = pos.coords;
    if(locMarker) map.removeLayer(locMarker);
    if(locCircle) map.removeLayer(locCircle);
    // Lollipop completo rojo pastel - bola + palito
    const locIcon = L.divIcon({
      html: `<svg width="32" height="50" viewBox="0 0 32 50" xmlns="http://www.w3.org/2000/svg">
        <line x1="16" y1="20" x2="16" y2="50" stroke="#D8A8A8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="16" cy="12" r="10" fill="#E8C8C8" stroke="#D8A8A8" stroke-width="2"/>
      </svg>`,
      iconSize: [32, 50],
      iconAnchor: [16, 50],
      className: 'loc-lollipop'
    });
    locCircle = L.marker([lat,lng], {icon: locIcon}).addTo(map);
    map.flyTo([lat,lng], 17, { animate:true, duration:1.8, easeLinearity:0.25 });
    this.classList.remove('locating');
    statusEl.classList.remove('visible');
  }, () => {
    this.classList.remove('locating');
    showStatus('No se pudo obtener la ubicación', 3000);
  }, {enableHighAccuracy:true, timeout:10000});
});

// Botones de zoom
document.getElementById('zoom-in').addEventListener('click', () => {
  map.zoomIn();
});

document.getElementById('zoom-out').addEventListener('click', () => {
  map.zoomOut();
});

// Registrar Service Worker para caching offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[App] Service Worker registrado:', reg.scope);
        statusEl.textContent = 'App lista para usar offline';
        statusEl.classList.add('visible');
        setTimeout(() => statusEl.classList.remove('visible'), 3000);
      })
      .catch(err => {
        console.warn('[App] Error registrando Service Worker:', err);
      });
  });
}
</script>
